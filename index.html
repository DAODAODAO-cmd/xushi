<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>谷子快速打表</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{--ink:#242038;--muted:#766f8f;--line:#ddd8ea;--accent:#7657d6;--accent-soft:#f0ebff;--paper:#fff}
    *{box-sizing:border-box}
    body{margin:0;background:#f4f1f9;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",sans-serif}
    button,input,textarea{font:inherit}
    button{cursor:pointer}
    .page{max-width:1180px;margin:0 auto;padding:28px 18px 48px}
    .hero{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px}
    h1{margin:0;font-size:28px;letter-spacing:.02em}
    .hero p{margin:7px 0 0;color:var(--muted);font-size:14px}
    .layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
    .card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 40px rgba(54,42,89,.08)}
    .editor{padding:18px}
    .section{padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid #ece8f3}
    .section:last-child{padding:0;margin:0;border:0}
    .label-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
    .label{font-size:13px;font-weight:800}
    .hint{color:var(--muted);font-size:11px;line-height:1.55}
    input,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);outline:none;padding:9px 10px}
    input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(118,87,214,.1)}
    textarea{min-height:116px;resize:vertical;line-height:1.65}
    .rate-wrap{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px}
    .rate-unit{color:var(--muted);font-size:12px}
    .goods-list{display:grid;gap:8px}
    .goods-row{display:grid;grid-template-columns:minmax(120px,1fr) 120px 32px 32px 32px;gap:7px;align-items:center}
    .icon-btn{width:32px;height:32px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#9a4961}
    .icon-btn:disabled{opacity:.28;cursor:not-allowed}
    .add-btn,.soft-btn,.primary-btn{border-radius:10px;padding:9px 13px;font-weight:700}
    .add-btn,.soft-btn{border:1px solid var(--line);background:#fff;color:#574d7a}
    .primary-btn{border:0;background:var(--accent);color:#fff;box-shadow:0 6px 16px rgba(118,87,214,.2)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .preview{overflow:hidden}
    .preview-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:17px 18px;border-bottom:1px solid var(--line)}
    .preview-title{font-size:16px;font-weight:900}
    .preview-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .sheet-wrap{overflow:auto;padding:20px}
    table{width:100%;min-width:640px;border-collapse:collapse;background:var(--paper);font-size:14px}
    th,td{border:1px solid #d8d8d8;padding:9px 10px;text-align:center;white-space:nowrap}
    th{font-weight:800;background:#f7f6fa}
    .left{text-align:left}
    .meta-label{background:#fafafa;font-weight:800;text-align:left}
    .money{font-variant-numeric:tabular-nums}
    .qty-input{width:58px;border:0;border-radius:5px;text-align:center;padding:5px;background:transparent}
    .qty-input:focus{background:#fff;box-shadow:0 0 0 2px var(--accent-soft)}
    .person-name{width:105px;border:0;border-radius:5px;padding:5px;background:transparent}
    .person-name:focus{background:#fff;box-shadow:0 0 0 2px var(--accent-soft)}
    .person-cell{background:#fff2a8;font-weight:800}
    .sheet-title{background:#fff;font-size:20px;font-weight:900;letter-spacing:.08em;padding:15px 10px;border-bottom:2px solid #aaa}
    .total-row td{background:#f0ebff;font-weight:900;border-top:2px solid var(--accent)}
    .amount-row td{background:#faf8ff;color:#5c477f;font-weight:700}
    .grand{color:var(--accent);font-size:16px}
    .empty{padding:56px 20px;text-align:center;color:var(--muted)}
    .delete-person{border:0;background:transparent;color:#aa4964;font-size:18px;padding:2px 7px}
    .toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,16px);background:#29243a;color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s}
    .toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:620px){.goods-row{grid-template-columns:minmax(100px,1fr) 90px 30px 30px 30px;gap:5px}.icon-btn{width:30px;height:30px}.hero{align-items:flex-start;flex-direction:column}.preview-head{align-items:flex-start;flex-direction:column}.sheet-wrap{padding:12px}.page{padding:18px 12px 36px}}
    @media print{body{background:#fff}.page{max-width:none;padding:0}.hero,.editor,.preview-head{display:none}.layout{display:block}.card,.preview{border:0;box-shadow:none}.sheet-wrap{padding:0}table{min-width:0}}
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div><h1>谷子快速打表</h1><p>填一次价格，用数字串快速录入；应收金额和每款总量自动计算。</p></div>
      <button class="soft-btn" id="resetBtn">清空重做</button>
    </header>

    <div class="layout">
      <section class="card editor" aria-label="录入区">
        <div class="section">
          <div class="label-row"><label class="label" for="sheetTitle">表格标头</label><span class="hint">显示在结果最上方</span></div>
          <input id="sheetTitle" maxlength="60" placeholder="例如：7 月谷子拼团打表">
        </div>
        <div class="section">
          <div class="label-row"><label class="label" for="rate">汇率</label><span class="hint">1 日元 ≈ ? 元</span></div>
          <div class="rate-wrap"><input id="rate" type="number" min="0" step="0.001" inputmode="decimal"><span class="rate-unit">人民币</span></div>
        </div>

        <div class="section">
          <div class="label-row"><span class="label">谷子名称与原价</span><button class="add-btn" id="addGoodBtn">＋ 加一款</button></div>
          <div class="goods-list" id="goodsList"></div>
          <div class="hint" style="margin-top:8px">顺序很重要：第 1 款对应数字串第 1 位。</div>
        </div>

        <div class="section">
          <div class="label-row"><label class="label" for="quickInput">快速录入</label><span class="hint">一人一行</span></div>
          <textarea id="quickInput" placeholder="小明 1111&#10;小红 1001"></textarea>
          <div class="hint" style="margin-top:7px">例如 4 款时，<b>1111</b> 表示每款各 1 个，<b>1001</b> 表示只拿第 1、4 款。数量超过 9 请写：<b>10,0,2,1</b>。</div>
          <div class="actions"><button class="primary-btn" id="applyBtn">生成 / 更新表格</button><button class="soft-btn" id="addPersonBtn">＋ 手动加人</button></div>
        </div>
      </section>

      <section class="card preview" aria-label="结果表格">
        <div class="preview-head">
          <div><div class="preview-title">打表结果</div><div class="preview-sub" id="summaryText">等待录入</div></div>
          <div class="actions" style="margin:0"><button class="primary-btn" id="personImageBtn">导出交肾图</button><button class="soft-btn" id="totalImageBtn">导出合计图</button><button class="soft-btn" id="excelBtn">导出 Excel</button></div>
        </div>
        <div class="sheet-wrap" id="sheet"></div>
      </section>
    </div>
  </main>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const STORE_KEY = 'goods_quick_sheet_v1';
    const defaultState = () => ({
      rate: 0.055,
      title: '谷子打表',
      goods: [{name:'A',price:900},{name:'B',price:500},{name:'C',price:600},{name:'D',price:400}],
      people: [],
      quick: ''
    });
    let state = loadState();

    function loadState(){
      try{
        const saved = JSON.parse(localStorage.getItem(STORE_KEY));
        if(saved && Array.isArray(saved.goods) && Array.isArray(saved.people)) return saved;
      }catch(e){}
      return defaultState();
    }
    function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    function num(v){ const n=Number(v); return Number.isFinite(n) ? Math.max(0,n) : 0; }
    function money(v){ return Math.round((v + Number.EPSILON) * 100) / 100; }
    function fmt(v){ return money(v).toLocaleString('zh-CN',{maximumFractionDigits:2}); }
    function esc(v){ return String(v ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function normalizePeople(){ state.people.forEach(p=>{ p.qtys=Array.from({length:state.goods.length},(_,i)=>num(p.qtys && p.qtys[i])); }); }
    function syncQuickFromPeople(){
      state.quick=state.people.map(p=>{
        const compact=p.qtys.every(q=>Number.isInteger(q)&&q>=0&&q<=9);
        return `${p.name} ${compact?p.qtys.join(''):p.qtys.join(',')}`;
      }).join('\n');
      document.getElementById('quickInput').value=state.quick;
    }

    function parseQty(code){
      const clean=String(code||'').trim();
      let values;
      if(/[，,、/\s]/.test(clean)) values=clean.split(/[，,、/\s]+/).filter(Boolean).map(num);
      else values=clean.split('').map(num);
      return Array.from({length:state.goods.length},(_,i)=>values[i]||0);
    }
    function parseQuick(){
      const rows=state.quick.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
      state.people=rows.map((line,index)=>{
        const match=line.match(/^(.+?)[：:\s]+([\d\s,，、/]+)$/);
        if(match) return {name:match[1].trim(),qtys:parseQty(match[2])};
        return {name:'第'+(index+1)+'人',qtys:parseQty(line)};
      });
      normalizePeople(); saveState(); renderSheet();
    }

    function renderGoods(){
      const box=document.getElementById('goodsList');
      box.innerHTML=state.goods.map((g,i)=>`<div class="goods-row">
        <input aria-label="第${i+1}款名称" data-good-name="${i}" value="${esc(g.name)}" placeholder="名称">
        <input aria-label="第${i+1}款原价" data-good-price="${i}" value="${esc(g.price)}" type="number" min="0" step="1" inputmode="decimal" placeholder="原价">
        <button class="icon-btn" data-good-move="up" data-good-index="${i}" title="向前移动" ${i===0?'disabled':''}>↑</button>
        <button class="icon-btn" data-good-move="down" data-good-index="${i}" title="向后移动" ${i===state.goods.length-1?'disabled':''}>↓</button>
        <button class="icon-btn" data-good-delete="${i}" title="删除这一款">×</button>
      </div>`).join('');
    }

    function calculate(){
      normalizePeople();
      const totals=state.goods.map((_,i)=>state.people.reduce((sum,p)=>sum+num(p.qtys[i]),0));
      const unitAmounts=state.goods.map(g=>money(num(g.price)*num(state.rate)));
      const itemAmounts=totals.map((q,i)=>money(q*unitAmounts[i]));
      const personAmounts=state.people.map(p=>money(p.qtys.reduce((sum,q,i)=>sum+num(q)*unitAmounts[i],0)));
      return {totals,unitAmounts,itemAmounts,personAmounts,grand:money(itemAmounts.reduce((a,b)=>a+b,0))};
    }

    function renderSheet(){
      const sheet=document.getElementById('sheet');
      const calc=calculate();
      document.getElementById('summaryText').textContent=state.people.length ? `${state.people.length} 人 · ${state.goods.length} 款 · 总应收 ¥${fmt(calc.grand)}` : `共 ${state.goods.length} 款，等待录入人员`;
      if(!state.goods.length){ sheet.innerHTML='<div class="empty">请先添加至少一款谷子</div>'; return; }
      const goodHeads=state.goods.map(g=>`<th>${esc(g.name||'未命名')}</th>`).join('');
      const prices=state.goods.map(g=>`<td class="money">${fmt(num(g.price))}</td>`).join('');
      const units=calc.unitAmounts.map(v=>`<td class="money">¥${fmt(v)}</td>`).join('');
      const people=state.people.map((p,pi)=>`<tr>
        <td class="left person-cell"><input class="person-name" data-person-name="${pi}" value="${esc(p.name)}"></td>
        <td class="money">¥${fmt(calc.personAmounts[pi])}</td>
        ${state.goods.map((_,gi)=>`<td><input class="qty-input" data-person="${pi}" data-good="${gi}" type="number" min="0" step="1" value="${num(p.qtys[gi])||''}" placeholder=""></td>`).join('')}
        <td><button class="delete-person" data-person-delete="${pi}" title="删除此人">×</button></td>
      </tr>`).join('');
      const totalQty=calc.totals.map(v=>`<td>${v?fmt(v):''}</td>`).join('');
      const totalMoney=calc.itemAmounts.map(v=>`<td class="money">${v?'¥'+fmt(v):''}</td>`).join('');
      sheet.innerHTML=`<table>
        <tr><th class="sheet-title" colspan="${state.goods.length+3}">${esc(state.title||'谷子打表')}</th></tr>
        <tr><th class="left">CN / 名字</th><th>应收</th>${goodHeads}<th>操作</th></tr>
        <tr><td class="meta-label">原价（日元）</td><td></td>${prices}<td></td></tr>
        <tr><td class="meta-label">折合单价</td><td></td>${units}<td></td></tr>
        ${people || `<tr><td colspan="${state.goods.length+3}" class="empty">在左侧输入，例如：小明 1111</td></tr>`}
        <tr class="total-row"><td class="left">每款总量</td><td>${fmt(calc.totals.reduce((a,b)=>a+b,0))} 个</td>${totalQty}<td></td></tr>
        <tr class="amount-row"><td class="left">每款总金额</td><td class="grand">¥${fmt(calc.grand)}</td>${totalMoney}<td></td></tr>
      </table>`;
      saveState();
    }

    function tableRows(){
      const c=calculate();
      const rows=[
        [state.title||'谷子打表'],
        ['汇率',state.rate],
        [],
        ['CN / 名字','应收','谷子名称','数量']
      ];
      state.people.forEach((p,pi)=>{
        let first=true;
        p.qtys.forEach((qty,gi)=>{
          if(num(qty)>0){
            rows.push([first?p.name:'',first?c.personAmounts[pi]:'',state.goods[gi].name||'未命名',num(qty)]);
            first=false;
          }
        });
      });
      rows.push([],['每款谷子总量','','谷子名称','总量','总金额']);
      state.goods.forEach((g,gi)=>{
        if(c.totals[gi]>0) rows.push(['','',g.name||'未命名',c.totals[gi],c.itemAmounts[gi]]);
      });
      rows.push(['全部合计',c.grand]);
      return rows;
    }
    function personImageData(){
      const c=calculate();
      const groups=[];
      state.people.forEach((p,pi)=>{
        const owned=[];
        p.qtys.forEach((qty,gi)=>{
          if(num(qty)>0){
            owned.push({name:state.goods[gi].name||'未命名',qty:num(qty),unitAmount:c.unitAmounts[gi]});
          }
        });
        if(owned.length) groups.push({name:p.name,owned,total:c.personAmounts[pi]});
      });
      const maxOwned=Math.max(1,...groups.map(g=>g.owned.length));
      const colCount=2+maxOwned;
      const rows=[{type:'title',cells:[state.title||'谷子打表']}];
      groups.forEach(g=>{
        const blanks=Array(maxOwned-g.owned.length).fill('');
        rows.push({type:'person',cells:[g.name,...g.owned.map(x=>`${x.name} ×${fmt(x.qty)}`),...blanks,'个人合计']});
        rows.push({type:'price',cells:['单价',...g.owned.map(x=>'¥'+fmt(x.unitAmount)),...blanks,'¥'+fmt(g.total)]});
      });
      if(!groups.length) rows.push({type:'empty',cells:['还没有有数量的谷子']});
      return {rows,colCount,widths:[190,...Array(colCount-1).fill(210)]};
    }
    function totalImageData(){
      const c=calculate();
      const rows=[
        {type:'title',cells:[(state.title||'谷子打表')+' · 合计']},
        {type:'totalHead',cells:['谷子名称','总数量','单价','总金额']}
      ];
      state.goods.forEach((g,gi)=>{
        if(c.totals[gi]>0) rows.push({type:'total',cells:[g.name||'未命名',fmt(c.totals[gi])+' 个','¥'+fmt(c.unitAmounts[gi]),'¥'+fmt(c.itemAmounts[gi])]});
      });
      rows.push({type:'grand',cells:['全部合计','','','¥'+fmt(c.grand)]});
      return {rows,colCount:4,widths:[260,160,180,200]};
    }
    function downloadTableImage(data,suffix){
      const rows=data.rows;
      const widths=data.widths;
      const rowH=54,titleH=76,pad=28;
      const tableW=widths.reduce((a,b)=>a+b,0);
      const cssW=tableW+pad*2;
      const cssH=pad*2+rows.reduce((sum,r)=>sum+(r.type==='title'?titleH:rowH),0);
      const scale=2;
      const canvas=document.createElement('canvas');
      canvas.width=cssW*scale;canvas.height=cssH*scale;
      const ctx=canvas.getContext('2d');ctx.scale(scale,scale);
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,cssW,cssH);
      ctx.textBaseline='middle';
      let y=pad;
      rows.forEach(r=>{
        const h=r.type==='title'?titleH:rowH;
        if(r.type==='title'||r.type==='section'||r.type==='empty'){
          ctx.fillStyle='#ffffff';ctx.fillRect(pad,y,tableW,h);
          if(r.type==='section')ctx.fillStyle='#eee8ff';
          if(r.type==='section')ctx.fillRect(pad,y,tableW,h);
          ctx.strokeStyle='#9b96aa';ctx.lineWidth=1;ctx.strokeRect(pad+.5,y+.5,tableW-1,h-1);
          ctx.fillStyle=r.type==='empty'?'#766f8f':'#242038';ctx.font=(r.type==='title'?'900 26px':'800 17px')+' "Microsoft YaHei","PingFang SC",sans-serif';ctx.textAlign='center';
          ctx.fillText(r.cells[0],pad+tableW/2,y+h/2);
        }else{
          let x=pad;
          Array.from({length:data.colCount},(_,i)=>r.cells[i]||'').forEach((cell,i)=>{
            let bg='#ffffff';
            if(r.type==='person'&&i===0)bg='#fff2a8';
            if(r.type==='price'&&i===data.colCount-1)bg='#ffe1ad';
            if(r.type==='grand'&&i===data.colCount-1)bg='#ffe1ad';
            ctx.fillStyle=bg;ctx.fillRect(x,y,widths[i],h);
            ctx.strokeStyle='#bdb9c6';ctx.lineWidth=1;ctx.strokeRect(x+.5,y+.5,widths[i]-1,h-1);
            ctx.fillStyle='#242038';
            ctx.font=(r.type==='grand'||r.type==='totalHead'||i===0||i===data.colCount-1?'800 ':'500 ')+'16px "Microsoft YaHei","PingFang SC",sans-serif';
            ctx.textAlign=i===0?'left':'center';
            const tx=i===0?x+14:x+widths[i]/2;
            ctx.fillText(String(cell||''),tx,y+h/2);
            x+=widths[i];
          });
        }
        y+=h;
      });
      const safe=(state.title||'谷子打表').replace(/[\\/:*?"<>|]/g,'_').slice(0,40);
      const a=document.createElement('a');a.download=safe+'_'+suffix+'_'+new Date().toISOString().slice(0,10)+'.png';a.href=canvas.toDataURL('image/png');a.click();toast(suffix+'已生成');
    }
    function excelData(){
      const c=calculate();
      const detail=[['CN / 名字','谷子名称','数量','单价','小计','个人合计']];
      state.people.forEach((p,pi)=>{
        let first=true;
        p.qtys.forEach((qty,gi)=>{
          if(num(qty)>0){
            detail.push([first?p.name:'',state.goods[gi].name||'未命名',num(qty),c.unitAmounts[gi],money(c.unitAmounts[gi]*num(qty)),first?c.personAmounts[pi]:'']);
            first=false;
          }
        });
      });
      const total=[['谷子名称','总数量','单价','总金额']];
      state.goods.forEach((g,gi)=>{if(c.totals[gi]>0)total.push([g.name||'未命名',c.totals[gi],c.unitAmounts[gi],c.itemAmounts[gi]])});
      total.push(['全部合计','','',c.grand]);
      return {detail,total};
    }
    function downloadExcel(){
      const data=excelData();
      const safe=(state.title||'谷子打表').replace(/[\\/:*?"<>|]/g,'_').slice(0,40);
      if(window.XLSX){
        const wb=XLSX.utils.book_new();
        const detail=XLSX.utils.aoa_to_sheet(data.detail);detail['!cols']=[{wch:18},{wch:24},{wch:10},{wch:12},{wch:12},{wch:14}];
        const total=XLSX.utils.aoa_to_sheet(data.total);total['!cols']=[{wch:24},{wch:12},{wch:12},{wch:14}];
        XLSX.utils.book_append_sheet(wb,detail,'交肾明细');XLSX.utils.book_append_sheet(wb,total,'合计');
        XLSX.writeFile(wb,safe+'_'+new Date().toISOString().slice(0,10)+'.xlsx');toast('Excel 已生成');return;
      }
      const rows=data.detail.concat([[]],data.total);
      const html='<meta charset="utf-8"><table border="1">'+rows.map(r=>'<tr>'+r.map(v=>'<td>'+esc(v)+'</td>').join('')+'</tr>').join('')+'</table>';
      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel'}));a.download=safe+'.xls';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);toast('Excel 已生成');
    }
    let toastTimer;
    function toast(text){ const el=document.getElementById('toast');el.textContent=text;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1800); }

    document.getElementById('rate').value=state.rate;
    document.getElementById('sheetTitle').value=state.title||'谷子打表';
    document.getElementById('quickInput').value=state.quick||'';
    renderGoods(); renderSheet();

    document.getElementById('rate').addEventListener('input',e=>{state.rate=num(e.target.value);renderSheet()});
    document.getElementById('sheetTitle').addEventListener('input',e=>{state.title=e.target.value;renderSheet()});
    document.getElementById('quickInput').addEventListener('input',e=>{state.quick=e.target.value;saveState()});
    document.getElementById('applyBtn').addEventListener('click',parseQuick);
    document.getElementById('quickInput').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')parseQuick()});
    document.getElementById('addGoodBtn').addEventListener('click',()=>{state.goods.push({name:String.fromCharCode(65+state.goods.length),price:0});normalizePeople();syncQuickFromPeople();renderGoods();renderSheet()});
    document.getElementById('addPersonBtn').addEventListener('click',()=>{state.people.push({name:'新的人',qtys:state.goods.map(()=>0)});syncQuickFromPeople();renderSheet()});
    document.getElementById('personImageBtn').addEventListener('click',()=>downloadTableImage(personImageData(),'交肾图'));
    document.getElementById('totalImageBtn').addEventListener('click',()=>downloadTableImage(totalImageData(),'合计图'));
    document.getElementById('excelBtn').addEventListener('click',downloadExcel);
    document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('确认清空当前打表内容？')){state=defaultState();document.getElementById('rate').value=state.rate;document.getElementById('sheetTitle').value=state.title;document.getElementById('quickInput').value='';renderGoods();renderSheet()}});

    document.getElementById('goodsList').addEventListener('input',e=>{
      if(e.target.dataset.goodName!==undefined) state.goods[Number(e.target.dataset.goodName)].name=e.target.value;
      if(e.target.dataset.goodPrice!==undefined) state.goods[Number(e.target.dataset.goodPrice)].price=num(e.target.value);
      renderSheet();
    });
    document.getElementById('goodsList').addEventListener('click',e=>{
      if(e.target.dataset.goodMove!==undefined){
        const from=Number(e.target.dataset.goodIndex);
        const to=e.target.dataset.goodMove==='up'?from-1:from+1;
        if(to<0||to>=state.goods.length)return;
        [state.goods[from],state.goods[to]]=[state.goods[to],state.goods[from]];
        state.people.forEach(p=>{[p.qtys[from],p.qtys[to]]=[p.qtys[to],p.qtys[from]]});
        syncQuickFromPeople();renderGoods();renderSheet();return;
      }
      if(e.target.dataset.goodDelete===undefined)return;
      if(state.goods.length===1){toast('至少保留一款');return;}
      const i=Number(e.target.dataset.goodDelete);state.goods.splice(i,1);state.people.forEach(p=>p.qtys.splice(i,1));syncQuickFromPeople();renderGoods();renderSheet();
    });
    document.getElementById('sheet').addEventListener('change',e=>{
      if(e.target.dataset.personName!==undefined) state.people[Number(e.target.dataset.personName)].name=e.target.value;
      if(e.target.dataset.person!==undefined) state.people[Number(e.target.dataset.person)].qtys[Number(e.target.dataset.good)]=num(e.target.value);
      syncQuickFromPeople();renderSheet();
    });
    document.getElementById('sheet').addEventListener('click',e=>{
      if(e.target.dataset.personDelete===undefined)return;
      state.people.splice(Number(e.target.dataset.personDelete),1);syncQuickFromPeople();renderSheet();
    });
  </script>
</body>
</html>
